{% extends 'base.html' %}
{% block title %}Post New Drive{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-8">
<div class="card shadow-sm border-0">
<div class="card-body p-4">
    <h4 class="fw-bold mb-4"><i class="bi bi-plus-circle text-success"></i> Post a Placement Drive</h4>

    <form method="POST" action="{{ url_for('company.create_drive') }}">
        <div class="mb-3">
            <label class="form-label">Job Title *</label>
            <input type="text" name="job_title" class="form-control" required placeholder="e.g. Software Engineer">
        </div>
        <div class="mb-3">
            <label class="form-label">Job Description *</label>
            <textarea name="job_description" class="form-control" rows="4" required
                placeholder="Describe the role, responsibilities..."></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Eligibility Criteria</label>
            <textarea name="eligibility_criteria" class="form-control" rows="2"
                placeholder="e.g. Min CGPA 7.0, CSE/IT branches only"></textarea>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Package (LPA)</label>
                <input type="number" step="0.1" name="package_lpa" class="form-control" placeholder="e.g. 12.5">
            </div>
            <div class="col mb-3">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control" placeholder="e.g. Bangalore, Remote">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Application Deadline *</label>
            <input type="date" name="application_deadline" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success w-100">
            <i class="bi bi-send"></i> Submit for Admin Approval
        </button>
    </form>
</div>
</div>
</div>
</div>
{% endblock %}
