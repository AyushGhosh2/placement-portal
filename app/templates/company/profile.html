{% extends 'base.html' %}
{% block title %}Company Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<div class="card shadow-sm border-0">
<div class="card-body p-4">
    <h4 class="fw-bold mb-4"><i class="bi bi-building text-success"></i> Company Profile</h4>

    <form method="POST" action="{{ url_for('company.profile') }}">
        <div class="mb-3">
            <label class="form-label">Company Name</label>
            <input type="text" name="company_name" class="form-control" value="{{ company.company_name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">HR Contact</label>
            <input type="text" name="hr_contact" class="form-control" value="{{ company.hr_contact or '' }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Website</label>
            <input type="url" name="website" class="form-control" value="{{ company.website or '' }}">
        </div>
        <div class="mb-4">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ company.description or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-success w-100">Save Changes</button>
    </form>
</div>
</div>
</div>
</div>
{% endblock %}
