{% extends 'base.html' %}
{% block title %}Edit Drive{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-8">
<div class="card shadow-sm border-0">
<div class="card-body p-4">
    <h4 class="fw-bold mb-4"><i class="bi bi-pencil text-warning"></i> Edit Drive</h4>

    <form method="POST" action="{{ url_for('company.edit_drive', drive_id=drive.id) }}">
        <div class="mb-3">
            <label class="form-label">Job Title *</label>
            <input type="text" name="job_title" class="form-control" required value="{{ drive.job_title }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Job Description *</label>
            <textarea name="job_description" class="form-control" rows="4" required>{{ drive.job_description }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Eligibility Criteria</label>
            <textarea name="eligibility_criteria" class="form-control" rows="2">{{ drive.eligibility_criteria or '' }}</textarea>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Package (LPA)</label>
                <input type="number" step="0.1" name="package_lpa" class="form-control" value="{{ drive.package_lpa or '' }}">
            </div>
            <div class="col mb-3">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control" value="{{ drive.location or '' }}">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Application Deadline *</label>
            <input type="date" name="application_deadline" class="form-control" required
                   value="{{ drive.application_deadline.strftime('%Y-%m-%d') }}">
        </div>
        <button type="submit" class="btn btn-warning w-100">Update Drive</button>
    </form>
</div>
</div>
</div>
</div>
{% endblock %}
