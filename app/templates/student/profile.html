{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<div class="card shadow-sm border-0">
<div class="card-body p-4">
    <h4 class="fw-bold mb-4"><i class="bi bi-person-circle text-primary"></i> My Profile</h4>

    <form method="POST" action="{{ url_for('student.profile') }}" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-control" value="{{ student.full_name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Roll Number</label>
            <input type="text" class="form-control" value="{{ student.roll_number }}" disabled>
            <small class="text-muted">Roll number cannot be changed.</small>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Department</label>
                <input type="text" name="department" class="form-control" value="{{ student.department or '' }}">
            </div>
            <div class="col mb-3">
                <label class="form-label">CGPA</label>
                <input type="number" step="0.01" min="0" max="10" name="cgpa" class="form-control"
                       value="{{ student.cgpa or '' }}">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control" value="{{ student.phone or '' }}">
        </div>
        <div class="mb-4">
            <label class="form-label">Upload Resume (PDF/DOC)</label>
            <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx">
            {% if student.resume_filename %}
            <small class="text-success">
                <i class="bi bi-file-earmark-check"></i>
                Current: {{ student.resume_filename }}
                <a href="{{ url_for('static', filename='uploads/' ~ student.resume_filename) }}"
                   target="_blank">(View)</a>
            </small>
            {% endif %}
        </div>
        <button type="submit" class="btn btn-primary w-100">Save Profile</button>
    </form>
</div>
</div>
</div>
</div>
{% endblock %}
