{% extends 'base.html' %}
{% block title %}Register — PlacementHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4 fw-bold">
                    <i class="bi bi-person-plus text-success"></i> Create Account
                </h4>

                <form method="POST" action="{{ url_for('auth.register') }}">

                    <!-- Role Selection -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Register as</label>
                        <select name="role" id="roleSelect" class="form-select" required>
                            <option value="">-- Select Role --</option>
                            <option value="student">Student</option>
                            <option value="company">Company</option>
                        </select>
                    </div>

                    <!-- Common Fields -->
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required minlength="6">
                    </div>

                    <!-- Student-Specific Fields -->
                    <div id="studentFields" style="display:none;">
                        <hr><p class="text-muted small fw-semibold">STUDENT DETAILS</p>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="full_name" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Roll Number</label>
                            <input type="text" name="roll_number" class="form-control">
                        </div>
                        <div class="row">
                            <div class="col mb-3">
                                <label class="form-label">Department</label>
                                <input type="text" name="department" class="form-control">
                            </div>
                            <div class="col mb-3">
                                <label class="form-label">CGPA</label>
                                <input type="number" step="0.01" min="0" max="10" name="cgpa" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="tel" name="phone" class="form-control">
                        </div>
                    </div>

                    <!-- Company-Specific Fields -->
                    <div id="companyFields" style="display:none;">
                        <hr><p class="text-muted small fw-semibold">COMPANY DETAILS</p>
                        <div class="mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text" name="company_name" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">HR Contact Name</label>
                            <input type="text" name="hr_contact" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Website URL</label>
                            <input type="url" name="website" class="form-control" placeholder="https://...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Company Description</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-2">Register</button>
                </form>

                <!-- NOTE: This select-based toggle is HTML5 only, no JS for core logic -->
                <!-- The form fields are shown/hidden using inline JS for UX only -->
                <script>
                    // This JS is only for UI enhancement (showing/hiding fields)
                    // Core logic (saving data) is all in Flask
                    document.getElementById('roleSelect').addEventListener('change', function() {
                        document.getElementById('studentFields').style.display =
                            this.value === 'student' ? 'block' : 'none';
                        document.getElementById('companyFields').style.display =
                            this.value === 'company' ? 'block' : 'none';
                    });
                </script>

                <hr>
                <p class="text-center text-muted small">
                    Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
